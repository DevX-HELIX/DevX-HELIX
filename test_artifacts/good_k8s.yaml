apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web
    owner: platform-team
    env: staging
    cost-centre: eng-42
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: web
          image: gcr.io/our-org/web-app:v1.2.3
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: db-password
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
