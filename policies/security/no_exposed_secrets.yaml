id: "POL-007"
name: "No exposed secrets in environment variables"
category: "security"
severity: "CRITICAL"
mode: "enforce"
description: "Secrets, passwords, and API keys must not be hardcoded in environment variables."
why_it_matters: "Hardcoded secrets in manifests are visible in version control, CI logs, and cluster state, creating critical security vulnerabilities."
applies_to:
  - "kubernetes"
  - "dockerfile"
rules:
  - field: "env_vars"
    suspicious_patterns:
      - "password"
      - "secret"
      - "token"
      - "key"
      - "apikey"
      - "api_key"
    base64_pattern: "^[A-Za-z0-9+/]{20,}={0,2}$"
remediation: |
  Kubernetes: Use secretKeyRef instead of plain-text values:
    env:
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: my-secret
            key: password
  Dockerfile: Use build arguments or runtime secrets instead of ENV:
    ARG DB_PASSWORD
    # Never: ENV DB_PASSWORD=my-secret-value
